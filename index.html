<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Murabba Aatshi Circle</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden; 
        }

        .controls {
            width: 100%;
            padding: 15px 10px;
            background: #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 10;
            box-sizing: border-box;
            flex-wrap: wrap; /* Allows buttons to wrap on very small screens */
        }

        .controls input {
            padding: 10px;
            width: 120px;
            border: 2px solid #ccc;
            border-radius: 8px;
            text-align: center;
            font-size: 16px; 
        }

        .controls button {
            font-size: 16px;
            padding: 12px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(0,123,255,0.4);
            touch-action: manipulation; 
        }

        .controls button.secondary {
            background-color: #28a745; /* Green for the font button */
            box-shadow: 0 2px 4px rgba(40,167,69,0.4);
        }

        .controls button:active {
            transform: scale(0.98);
        }

        .canvas-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            min-height: 0; 
        }

        canvas {
            max-width: 100%; 
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="controls">
        <input type="number" id="userInput" value="34" min="34" placeholder="Enter number">
        <button onclick="calculateAndDraw()">Generate</button>
        <button class="secondary" id="fontButton" onclick="loadCustomFont()">Load Nastaleeq Font</button>
    </div>

    <div class="canvas-container">
        <canvas id="dartboardCanvas" width="1000" height="1000"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('dartboardCanvas');
        const ctx = canvas.getContext('2d');

        const cx = 500;
        const cy = 500;
        const r_inner = 75;
        const r_middle = 250;
        const r_outer = 450;
        const text_radius_mid = r_inner + (r_middle - r_inner) / 2;
        const text_radius_out = r_middle + (r_outer - r_middle) / 2;

        // Global variable to track the active font family
        let currentFontFamily = '"Arial Black", Impact, sans-serif';

        const boxMappings = [
            { ring: 'out', angle: 105 }, 
            { ring: 'out', angle: 15 },  
            { ring: 'mid', angle: 315 }, 
            { ring: 'out', angle: 225 }, 
            { ring: 'out', angle: 315 }, 
            { ring: 'mid', angle: 225 }, 
            { ring: 'out', angle: 165 }, 
            { ring: 'out', angle: 75 },  
            { ring: 'out', angle: 195 }, 
            { ring: 'out', angle: 285 }, 
            { ring: 'out', angle: 45 },  
            { ring: 'mid', angle: 135 }, 
            { ring: 'mid', angle: 45 },  
            { ring: 'out', angle: 135 }, 
            { ring: 'out', angle: 255 }, 
            { ring: 'out', angle: 345 }  
        ];

        // Function to load the custom font from the repository
        async function loadCustomFont() {
            const fontButton = document.getElementById('fontButton');
            fontButton.innerText = "Loading...";
            fontButton.disabled = true;

            try {
                // IMPORTANT: Ensure your file has a .ttf or .otf extension in your GitHub repo!
                const customFont = new FontFace('QalamTaj', 'url(fonts/qalam_taj_nastaleeq.ttf)');
                await customFont.load();
                document.fonts.add(customFont);
                
                // Update global font and redraw
                currentFontFamily = 'QalamTaj';
                calculateAndDraw();
                
                fontButton.innerText = "Nastaleeq Loaded!";
                fontButton.style.backgroundColor = "#6c757d"; // Gray out on success
            } catch (error) {
                console.error("Error loading font:", error);
                alert("Failed to load font. Please ensure the file exists in 'fonts/' and has a .ttf or .otf extension.");
                fontButton.innerText = "Load Nastaleeq Font";
                fontButton.disabled = false;
            }
        }

        function drawShapeBase() {
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#000000';
            ctx.fillStyle = '#000000';

            ctx.beginPath();
            ctx.arc(cx, cy, r_inner, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, r_middle, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, r_outer, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath(); ctx.moveTo(cx + r_inner, cy); ctx.lineTo(cx + r_outer, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy + r_inner); ctx.lineTo(cx, cy + r_outer); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx - r_inner, cy); ctx.lineTo(cx - r_outer, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy - r_inner); ctx.lineTo(cx, cy - r_outer); ctx.stroke();

            for (let i = 0; i < 12; i++) {
                if (i % 3 === 0) continue; 
                let angle = i * Math.PI / 6;
                ctx.beginPath();
                ctx.moveTo(cx + r_middle * Math.cos(angle), cy + r_middle * Math.sin(angle));
                ctx.lineTo(cx + r_outer * Math.cos(angle), cy + r_outer * Math.sin(angle));
                ctx.stroke();
            }
        }

        function drawNumber(text, angleDegrees, radius) {
            let fontSize = 65; // Starting max font size
            
            // Set initial font to measure text width
            ctx.font = `900 ${fontSize}px ${currentFontFamily}`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#000000'; 
            
            // DYNAMIC FONT SIZING LOGIC:
            // Calculate max safe width based on the radius.
            // Each box is an arc of 30 degrees (Math.PI / 6).
            // We use 75% of the arc length as a safe boundary to keep text from touching walls.
            let maxSafeWidth = radius * (Math.PI / 6) * 0.75;
            let currentTextWidth = ctx.measureText(text).width;

            // If text is too wide, scale the font size down proportionally
            if (currentTextWidth > maxSafeWidth) {
                let scaleRatio = maxSafeWidth / currentTextWidth;
                fontSize = Math.floor(fontSize * scaleRatio);
                
                // Enforce a minimum readable font size
                fontSize = Math.max(fontSize, 16); 
                
                // Re-apply the newly calculated smaller font size
                ctx.font = `900 ${fontSize}px ${currentFontFamily}`;
            }
            
            let angleRad = angleDegrees * Math.PI / 180;
            let x = cx + radius * Math.cos(angleRad);
            let y = cy + radius * Math.sin(angleRad);
            ctx.fillText(text, x, y + 4); 
        }

        function calculateAndDraw() {
            const inputField = document.getElementById('userInput');
            let inputValue = parseInt(inputField.value, 10);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (isNaN(inputValue) || inputValue < 34) {
                ctx.fillStyle = '#d9534f'; 
                ctx.font = 'bold 45px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText("Invalid Input", cx, cy - 30);
                
                ctx.fillStyle = '#333333';
                ctx.font = '30px Arial';
                ctx.fillText("Number must be 34 or greater", cx, cy + 30);
                return; 
            }

            let baseValue = inputValue - 30;
            let startingNumber = Math.floor(baseValue / 4);
            let remainder = baseValue % 4;

            drawShapeBase();

            for (let i = 0; i < boxMappings.length; i++) {
                let box = boxMappings[i];
                let radius = (box.ring === 'mid') ? text_radius_mid : text_radius_out;
                
                let valueToPrint = startingNumber + i;

                if (remainder === 1 && i >= 12) {
                    valueToPrint += 1;
                } else if (remainder === 2 && i >= 8) {
                    valueToPrint += 1;
                } else if (remainder === 3 && i >= 4) {
                    valueToPrint += 1;
                }
                
                drawNumber(valueToPrint.toString(), box.angle, radius);
            }
        }

        window.onload = calculateAndDraw;

    </script>
</body>
</html>
