<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Murabba Aatshi Circle</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #f4f4f9;
            font-family: Arial, sans-serif;
        }

        .controls {
            width: 100%;
            padding: 15px 10px;
            background: #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: sticky; 
            top: 0;
            z-index: 100;
            box-sizing: border-box;
        }

        .controls input {
            padding: 10px;
            width: 120px;
            border: 2px solid #ccc;
            border-radius: 8px;
            text-align: center;
            font-size: 16px; 
        }

        .controls button {
            font-size: 16px;
            padding: 12px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(0,123,255,0.4);
            touch-action: manipulation; 
        }

        .controls button:active {
            background-color: #0056b3;
            transform: scale(0.98);
        }

        .canvas-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            padding: 20px 10px; 
            box-sizing: border-box;
        }

        canvas {
            max-width: 100%; 
            height: auto; 
            background-color: transparent;
        }
    </style>
</head>
<body>

    <div class="controls">
        <input type="number" id="userInput" value="34" min="34" placeholder="Enter number">
        <button onclick="calculateAndDraw()">Generate</button>
    </div>

    <div class="canvas-container">
        <canvas id="dartboardCanvas" width="1000" height="2100"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('dartboardCanvas');
        const ctx = canvas.getContext('2d');

        const r_inner = 70;  
        const r_middle = 240; 
        const r_outer = 430; 
        
        const text_radius_mid = r_inner + (r_middle - r_inner) / 2;
        const text_radius_out = r_middle + (r_outer - r_middle) / 2;

        const boxMappings = [
            { ring: 'out', angle: 105 }, 
            { ring: 'out', angle: 15 },  
            { ring: 'mid', angle: 315 }, 
            { ring: 'out', angle: 225 }, 
            { ring: 'out', angle: 315 }, 
            { ring: 'mid', angle: 225 }, 
            { ring: 'out', angle: 165 }, 
            { ring: 'out', angle: 75 },  
            { ring: 'out', angle: 195 }, 
            { ring: 'out', angle: 285 }, 
            { ring: 'out', angle: 45 },  
            { ring: 'mid', angle: 135 }, 
            { ring: 'mid', angle: 45 },  
            { ring: 'out', angle: 135 }, 
            { ring: 'out', angle: 255 }, 
            { ring: 'out', angle: 345 }  
        ];

        function drawShapeBase(cx, cy) {
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#000000';
            ctx.fillStyle = '#000000';

            ctx.beginPath();
            ctx.arc(cx, cy, r_inner, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, r_middle, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, r_outer, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath(); ctx.moveTo(cx + r_inner, cy); ctx.lineTo(cx + r_outer, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy + r_inner); ctx.lineTo(cx, cy + r_outer); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx - r_inner, cy); ctx.lineTo(cx - r_outer, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy - r_inner); ctx.lineTo(cx, cy - r_outer); ctx.stroke();

            for (let i = 0; i < 12; i++) {
                if (i % 3 === 0) continue; 
                let angle = i * Math.PI / 6;
                ctx.beginPath();
                ctx.moveTo(cx + r_middle * Math.cos(angle), cy + r_middle * Math.sin(angle));
                ctx.lineTo(cx + r_outer * Math.cos(angle), cy + r_outer * Math.sin(angle));
                ctx.stroke();
            }
        }

        function drawNumber(text, angleDegrees, radius, fontSize, cx, cy) {
            ctx.font = `900 ${fontSize}px "Arial Black", Impact, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#000000'; 
            
            let angleRad = angleDegrees * Math.PI / 180;
            let x = cx + radius * Math.cos(angleRad);
            let y = cy + radius * Math.sin(angleRad);
            
            ctx.fillText(text, x, y + (fontSize * 0.08)); 
        }

        function drawCompleteCircle(inputValue, titleText, cx, cy) {
            let baseValue = inputValue - 30;
            let startingNumber = Math.floor(baseValue / 4);
            let remainder = baseValue % 4;

            drawShapeBase(cx, cy);

            ctx.font = 'bold 75px "Times New Roman", Times, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillStyle = '#000000';
            ctx.fillText(titleText, cx, cy - r_outer - 15); 

            let numbersToDraw = [];
            for (let i = 0; i < boxMappings.length; i++) {
                let box = boxMappings[i];
                let radius = (box.ring === 'mid') ? text_radius_mid : text_radius_out;
                let sliceAngleRad = (box.ring === 'mid') ? (Math.PI / 2) : (Math.PI / 6); 
                
                let valueToPrint = startingNumber + i;

                if (remainder === 1 && i >= 12) valueToPrint += 1;
                else if (remainder === 2 && i >= 8) valueToPrint += 1;
                else if (remainder === 3 && i >= 4) valueToPrint += 1;
                
                numbersToDraw.push({ 
                    text: valueToPrint.toString(), 
                    angle: box.angle, 
                    radius: radius,
                    sliceAngleRad: sliceAngleRad
                });
            }

            let maxInitialFontSize = 85;     
            let safeWidthMultiplier = 0.65;   
            
            let globalFontSize = maxInitialFontSize;
            ctx.font = `900 ${maxInitialFontSize}px "Arial Black", Impact, sans-serif`; 
            
            for (let item of numbersToDraw) {
                let maxSafeWidth = item.radius * item.sliceAngleRad * safeWidthMultiplier;
                let currentTextWidth = ctx.measureText(item.text).width;

                if (currentTextWidth > maxSafeWidth) {
                    let scaleRatio = maxSafeWidth / currentTextWidth;
                    let neededFontSize = Math.floor(maxInitialFontSize * scaleRatio);
                    
                    if (neededFontSize < globalFontSize) {
                        globalFontSize = neededFontSize;
                    }
                }
            }
            
            globalFontSize = Math.max(globalFontSize, 16); 

            for (let item of numbersToDraw) {
                drawNumber(item.text, item.angle, item.radius, globalFontSize, cx, cy);
            }
        }

        function calculateAndDraw() {
            const inputField = document.getElementById('userInput');
            let inputValue = parseInt(inputField.value, 10);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (isNaN(inputValue) || inputValue < 34) {
                ctx.fillStyle = '#d9534f'; 
                ctx.font = 'bold 45px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText("Invalid Input", 500, 200);
                
                ctx.fillStyle = '#333333';
                ctx.font = '30px Arial';
                ctx.fillText("Number must be 34 or greater", 500, 260);
                return; 
            }

            // --- DRAW THE TOP DYNAMIC CIRCLE ---
            // Center Y is 550
            drawCompleteCircle(inputValue, "Naqsh", 500, 550);

            // --- DRAW THE BOTTOM CONSTANT CIRCLE ---
            // Center Y pushed down to 1580 to create a comfortable gap
            drawCompleteCircle(34, "Chaal", 500, 1580);
        }

        window.onload = calculateAndDraw;

    </script>
</body>
</html>
